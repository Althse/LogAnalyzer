{% extends "layout.html" %}

{% block title %}Upload Log{% endblock %}

{% block main %}
<h1>Upload Log</h1>
<p>Upload a SSH log file or use an example logs:</p>

<!-- Upload from your computer -->
<form id="uploadForm" method="POST" enctype="multipart/form-data">
    <input type="file" name="logfile" required>
    <button class="btn" type="submit">Upload</button>
</form>

<p id="uploadMsg" style="color: #0ff; margin-top: 1rem;"></p>

<hr>

<!-- Example logs -->
{% if examples %}
<h3>Example Logs</h3>
<div id="exampleLogs">
    {% for f in examples %}
        <button class="btn" type="button" onclick="uploadExample('{{ f }}')">{{ f }}</button>
    {% endfor %}
</div>
{% else %}
<p>No example logs found.</p>
{% endif %}

<script>
function showMessage(msg) {
    document.getElementById('uploadMsg').textContent = msg;
}

document.getElementById('uploadForm').onsubmit = function(e) {
    e.preventDefault();
    var formData = new FormData(this);
    var xhr = new XMLHttpRequest();
    xhr.open('POST', '/upload_page', true);
    xhr.onload = function() {
        if (xhr.status === 200) {
            showMessage("Upload successful!");
            setTimeout(function() { window.location.href = '/'; }, 1500);
        } else {
            showMessage("Upload failed.");
        }
    };
    xhr.send(formData);
};

function uploadExample(filename) {
    var formData = new FormData();
    formData.append('example_file', filename);
    var xhr = new XMLHttpRequest();
    xhr.open('POST', '/upload_page', true);
    xhr.onload = function() {
        if (xhr.status === 200) {
            showMessage('Example log "' + filename + '" uploaded successfully!');
            setTimeout(function() { window.location.href = '/'; }, 1500);
        } else {
            showMessage("Upload failed.");
        }
    };
    xhr.send(formData);
}
</script>
{% endblock %}
