{% extends "layout.html" %}

{% block title %}Reset Database{% endblock %}

{% block main %}
<h1>Reset Database</h1>
<p>Clear all logs from the database.</p>

<button class="btn" id="resetBtn">Reset Database</button>
<p id="message" style="margin-top: 1rem; color: #0ff;"></p>

<script>
const resetBtn = document.getElementById('resetBtn');
const messageEl = document.getElementById('message');

resetBtn.addEventListener('click', async () => {
    if (!confirm('Are you sure you want to reset the database?')) return;

    const res = await fetch('/reset', { method: 'POST' });
    const data = await res.json();

    messageEl.textContent = data.message;

    // Wait 1,5s and redirect
    setTimeout(() => {
        window.location.href = '/';
    }, 1500); 
});
</script>
{% endblock %}
